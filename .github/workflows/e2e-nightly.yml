name: E2E Nightly

# 04 §7.3 / 09 §7.4 — pipeline nocturno, no bloquea cada commit
# Bloquea el release semanal si falla
on:
  schedule:
    - cron: "0 7 * * 2-7"    # 02:00 UTC-5 (07:00 UTC), martes a domingo
  workflow_dispatch:           # permite ejecución manual

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: E2E — 3 flujos críticos (modo in-memory)
        run: pytest tests/e2e/ -v --tb=short

      - name: Notificar fallo (Sant por WhatsApp — RO-05)
        if: failure()
        run: |
          echo "::error::E2E nightly FAILED — revisar tests/e2e/ antes del próximo release"
          echo "Acción manual: Sant recibe notificación — ver runbook 08 §4.3"
