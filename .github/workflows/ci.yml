name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + SAST + OWASP ────────────────────────────────────────────────────
  lint-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit

      - name: Lint (ruff)
        run: ruff check src/ api/ tests/

      - name: SAST (bandit) — 0 hallazgos CRITICAL
        run: bandit -r src/ api/ -ll

      - name: OWASP dependency check (pip-audit)
        run: pip-audit --desc

  # ── Suite completa 820 tests + cobertura ───────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Suite completa con coverage
        run: |
          pytest tests/ \
            --cov=src --cov=api \
            --cov-branch \
            --cov-report=xml:coverage.xml \
            -q

      - name: Coverage — todos los umbrales (check_coverage.py)
        run: python scripts/check_coverage.py coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  # ── DIP + OpenAPI + Seed nivel 1 ───────────────────────────────────────────
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: DIP check — 4 módulos
        run: |
          for mod in catalogo stock pedidos taller; do
            echo "=== DIP: $mod ==="
            python scripts/check_dip.py --module $mod
          done

      - name: OpenAPI validation — 4 módulos
        run: python scripts/validate_openapi.py --all

      - name: Seed nivel 1 (smoke test en memoria)
        run: |
          for mod in catalogo stock pedidos taller; do
            python scripts/seed.py --level=1 --module=$mod --env=test
          done

  # ── Build Docker + Trivy ───────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [lint-security, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build imagen Docker
        run: docker build -t tecnimotos-api:${{ github.sha }} .

      - name: Trivy scan — 0 CRITICAL/HIGH sin mitigación
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "tecnimotos-api:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

  # ── Secrets scan (gitleaks) ────────────────────────────────────────────────
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — 0 secretos en repositorio
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Incidente 2026-07-04: levantar-sistema.md siguió trackeado en HEAD
      # meses después de agregarse a .gitignore (agregar la regla no aplica
      # retroactivamente — requiere `git rm --cached`). gitleaks no detecta
      # este tipo de incidente porque el contenido no son secretos de alta
      # entropía. Este check cierra ese gap específico.
      - name: Verificar que ningún archivo trackeado coincide con .gitignore
        run: |
          COINCIDENCIAS=$(git ls-files -i --exclude-standard -c)
          if [ -n "$COINCIDENCIAS" ]; then
            echo "ERROR: los siguientes archivos están trackeados pese a estar en .gitignore:"
            echo "$COINCIDENCIAS"
            echo "Ejecuta: git rm --cached <archivo> y commitea el cambio."
            exit 1
          fi
          echo "OK — ningún archivo trackeado coincide con .gitignore."
